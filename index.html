<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Friend Hiro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;

    background-image:url("https://hirohaokip552-sketch.github.io/MLBB-BANG-BANG/mobile-legends-bang-bang-cards-768x524.webp");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    width:90%;
    max-width:380px;

    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.2);

    border-radius:20px;
    padding:30px;
    color:white;

    box-shadow:0 8px 25px rgba(0,0,0,.3);
}

h2{
    text-align:center;
    margin-bottom:25px;
    font-size:30px;
}

input,
textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;

    border:none;
    outline:none;

    border-radius:12px;

    font-size:16px;

    background:rgba(255,255,255,.85);
}

textarea{
    height:130px;
    resize:none;
}

button{
    width:100%;
    padding:13px;

    border:none;
    border-radius:30px;

    font-size:17px;
    font-weight:bold;

    cursor:pointer;

    background:white;
    color:#001f4d;

    transition:.3s;
}

button:hover{
    transform:scale(1.05);
    background:#e9e9e9;
}

button:active{
    transform:scale(.97);
}
</style>

</head>
<body>

<div class="container">

<div class="box">

<h2>Your Friend Hiro</h2>

<form action="https://api.web3forms.com/submit" method="POST">

<input type="hidden" name="access_key" value="YOUR_NEW_ACCESS_KEY">

<input type="hidden" name="subject" value="Message from Your Friend Hiro">

<input type="hidden" name="from_name" value="Your Friend Hiro Website">

<input
type="text"
name="name"
placeholder="Your Name"
required>

<input
type="email"
name="email"
placeholder="Your Email"
required>

<textarea
name="message"
placeholder="Write your message..."
required></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</div>

</body>
</html>
